<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Etiqueta Correios</title>
  <style>
    @page { margin: 0; size: auto; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font: 12px/1.35 Arial, sans-serif;
      color: #222;
      background: rgba(255,255,255,.94);
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px 12px;
      z-index: 2;
    }
    .err {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font: 14px/1.4 Arial, sans-serif;
      color: #900;
      text-align: center;
    }
    @media print {
      .hint { display: none !important; }
      html, body, canvas { width: 100%; height: 100%; }
    }
    @media screen {
      body { background: #888; }
      canvas { box-shadow: 0 8px 28px rgba(0,0,0,.35); }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <canvas id="out"></canvas>
  <p class="hint" id="hint">Etiqueta em tela cheia — ajuste o papel na impressora (ex. 4×6″)</p>
  <div class="err" id="err" hidden></div>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function showError(msg) {
      document.getElementById('err').hidden = false;
      document.getElementById('err').textContent = msg;
      document.getElementById('hint').hidden = true;
    }

    function findContentBounds(ctx, w, h) {
      const data = ctx.getImageData(0, 0, w, h).data;
      let minX = w;
      let minY = h;
      let maxX = 0;
      let maxY = 0;
      for (let y = 0; y < h; y += 1) {
        for (let x = 0; x < w; x += 1) {
          const i = (y * w + x) * 4;
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          if (r < 248 || g < 248 || b < 248) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX <= minX || maxY <= minY) return null;
      const pad = Math.round(Math.min(w, h) * 0.008);
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(w - 1, maxX + pad);
      maxY = Math.min(h - 1, maxY + pad);
      return { minX, minY, width: maxX - minX + 1, height: maxY - minY + 1 };
    }

    async function renderPageToCanvas(page, scale) {
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      return canvas;
    }

    async function pickBestPage(pdf) {
      let best = { pageNum: 1, area: 0, canvas: null, bounds: null };
      const maxPages = Math.min(pdf.numPages, 3);
      for (let n = 1; n <= maxPages; n += 1) {
        const page = await pdf.getPage(n);
        const canvas = await renderPageToCanvas(page, 2.5);
        const bounds = findContentBounds(canvas.getContext('2d'), canvas.width, canvas.height);
        const area = bounds ? bounds.width * bounds.height : 0;
        if (area > best.area) best = { pageNum: n, area, canvas, bounds };
      }
      return best;
    }

    function drawFullBleed(source, bounds) {
      const out = document.getElementById('out');
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssW = window.innerWidth;
      const cssH = window.innerHeight;
      out.width = Math.round(cssW * dpr);
      out.height = Math.round(cssH * dpr);
      out.style.width = cssW + 'px';
      out.style.height = cssH + 'px';
      const ctx = out.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, out.width, out.height);
      const sx = bounds.minX;
      const sy = bounds.minY;
      const sw = bounds.width;
      const sh = bounds.height;
      ctx.drawImage(source, sx, sy, sw, sh, 0, 0, out.width, out.height);
    }

    async function run() {
      const key = new URLSearchParams(location.search).get('key');
      if (!key) {
        showError('PDF não encontrado. Gere a etiqueta de novo no admin.');
        return;
      }
      const b64 = sessionStorage.getItem(key);
      sessionStorage.removeItem(key);
      if (!b64) {
        showError('PDF expirado. Clique em Etiqueta novamente.');
        return;
      }
      try {
        const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const best = await pickBestPage(pdf);
        if (!best.bounds) throw new Error('Não foi possível detectar a etiqueta no PDF.');
        drawFullBleed(best.canvas, best.bounds);
        window.__stfLabel = best;
        setTimeout(function () { window.print(); }, 400);
      } catch (err) {
        showError(err.message || 'Falha ao renderizar etiqueta.');
      }
    }

    window.addEventListener('resize', function () {
      if (window.__stfLabel && window.__stfLabel.bounds) {
        drawFullBleed(window.__stfLabel.canvas, window.__stfLabel.bounds);
      }
    });

    run();
  </script>
</body>
</html>
