<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Etiqueta Correios</title>
  <style>
    @page { margin: 0; size: auto; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
    .hint {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      font: 12px/1.35 Arial, sans-serif; color: #222;
      background: rgba(255,255,255,.94); border: 1px solid #ccc; border-radius: 8px;
      padding: 8px 12px; z-index: 2;
    }
    .err {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; font: 14px/1.4 Arial, sans-serif; color: #900; text-align: center;
    }
    @media print {
      .hint { display: none !important; }
      html, body { background: #fff; }
    }
    @media screen {
      body { background: #666; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <canvas id="out"></canvas>
  <p class="hint" id="hint">Etiqueta em tela cheia — papel 4×6″ na impressora, escala 100%</p>
  <div class="err" id="err" hidden></div>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function showError(msg) {
      document.getElementById('err').hidden = false;
      document.getElementById('err').textContent = msg;
      document.getElementById('hint').hidden = true;
    }

    function findContentBounds(ctx, w, h, threshold) {
      const t = threshold ?? 240;
      const data = ctx.getImageData(0, 0, w, h).data;
      let minX = w, minY = h, maxX = 0, maxY = 0;
      for (let y = 0; y < h; y += 1) {
        for (let x = 0; x < w; x += 1) {
          const i = (y * w + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2];
          if (r < t || g < t || b < t) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX <= minX || maxY <= minY) return null;
      return { minX, minY, width: maxX - minX + 1, height: maxY - minY + 1 };
    }

    function findDenseLabelRegion(ctx, w, h) {
      const cols = 12;
      const rows = 16;
      const cellW = Math.ceil(w / cols);
      const cellH = Math.ceil(h / rows);
      const data = ctx.getImageData(0, 0, w, h).data;
      let best = null;
      for (let gy = 0; gy < rows; gy += 1) {
        for (let gx = 0; gx < cols; gx += 1) {
          let count = 0;
          const x0 = gx * cellW;
          const y0 = gy * cellH;
          const x1 = Math.min(w, x0 + cellW);
          const y1 = Math.min(h, y0 + cellH);
          for (let y = y0; y < y1; y += 2) {
            for (let x = x0; x < x1; x += 2) {
              const i = (y * w + x) * 4;
              if (data[i] < 235 || data[i + 1] < 235 || data[i + 2] < 235) count += 1;
            }
          }
          if (!best || count > best.count) best = { gx, gy, count };
        }
      }
      if (!best || best.count < 8) return null;
      const grow = (gx0, gy0, gx1, gy1) => {
        let minX = gx0 * cellW, minY = gy0 * cellH;
        let maxX = Math.min(w, (gx1 + 1) * cellW);
        let maxY = Math.min(h, (gy1 + 1) * cellH);
        const pad = Math.round(Math.min(w, h) * 0.01);
        minX = Math.max(0, minX - pad);
        minY = Math.max(0, minY - pad);
        maxX = Math.min(w, maxX + pad);
        maxY = Math.min(h, maxY + pad);
        return { minX, minY, width: maxX - minX, height: maxY - minY };
      };
      let gx0 = best.gx, gy0 = best.gy, gx1 = best.gx, gy1 = best.gy;
      const isDense = (gx, gy) => {
        if (gx < 0 || gy < 0 || gx >= cols || gy >= rows) return false;
        let count = 0;
        const x0 = gx * cellW, y0 = gy * cellH;
        for (let y = y0; y < y0 + cellH && y < h; y += 3) {
          for (let x = x0; x < x0 + cellW && x < w; x += 3) {
            const i = (y * w + x) * 4;
            if (data[i] < 235 || data[i + 1] < 235 || data[i + 2] < 235) count += 1;
          }
        }
        return count >= 4;
      };
      for (let pass = 0; pass < 24; pass += 1) {
        let grew = false;
        if (isDense(gx0 - 1, gy0)) { gx0 -= 1; grew = true; }
        if (isDense(gx1 + 1, gy0)) { gx1 += 1; grew = true; }
        if (isDense(gx0, gy0 - 1)) { gy0 -= 1; grew = true; }
        if (isDense(gx0, gy1 + 1)) { gy1 += 1; grew = true; }
        if (!grew) break;
      }
      return grow(gx0, gy0, gx1, gy1);
    }

    function detectLabelBounds(canvas) {
      const w = canvas.width;
      const h = canvas.height;
      const ctx = canvas.getContext('2d');
      for (const threshold of [220, 235, 248]) {
        const b = findContentBounds(ctx, w, h, threshold);
        if (!b) continue;
        if (b.width <= w * 0.72 && b.height <= h * 0.72) return b;
      }
      const dense = findDenseLabelRegion(ctx, w, h);
      if (dense) return dense;
      const fallback = findContentBounds(ctx, w, h, 248);
      if (!fallback) return null;
      return {
        minX: fallback.minX,
        minY: fallback.minY,
        width: Math.min(fallback.width, Math.round(w * 0.55)),
        height: Math.min(fallback.height, Math.round(h * 0.45))
      };
    }

    async function renderPageToCanvas(page, scale) {
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      return canvas;
    }

    async function pickBestPage(pdf) {
      let best = { area: 0, canvas: null, bounds: null };
      const maxPages = Math.min(pdf.numPages, 2);
      for (let n = 1; n <= maxPages; n += 1) {
        const page = await pdf.getPage(n);
        const canvas = await renderPageToCanvas(page, 3);
        const bounds = detectLabelBounds(canvas);
        const area = bounds ? bounds.width * bounds.height : 0;
        if (area > best.area) best = { canvas, bounds };
      }
      return best;
    }

    function drawFullBleed(source, bounds) {
      const out = document.getElementById('out');
      const cssW = window.innerWidth || 400;
      const cssH = window.innerHeight || 600;
      const dpr = Math.max(2, window.devicePixelRatio || 1);
      out.width = Math.round(cssW * dpr);
      out.height = Math.round(cssH * dpr);
      const ctx = out.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(
        source,
        bounds.minX, bounds.minY, bounds.width, bounds.height,
        0, 0, out.width, out.height
      );
    }

    async function run() {
      const key = new URLSearchParams(location.search).get('key');
      if (!key) {
        showError('PDF não encontrado. Gere a etiqueta de novo no admin.');
        return;
      }
      const b64 = sessionStorage.getItem(key);
      if (!b64) {
        showError('PDF expirado. Clique em Etiqueta novamente.');
        return;
      }
      try {
        const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const best = await pickBestPage(pdf);
        if (!best.bounds) throw new Error('Não foi possível detectar a etiqueta no PDF.');
        sessionStorage.removeItem(key);
        window.__stfLabel = best;
        drawFullBleed(best.canvas, best.bounds);
        window.addEventListener('beforeprint', () => drawFullBleed(best.canvas, best.bounds));
        window.addEventListener('resize', () => drawFullBleed(best.canvas, best.bounds));
        setTimeout(function () { window.print(); }, 500);
      } catch (err) {
        showError(err.message || 'Falha ao renderizar etiqueta.');
      }
    }

    run();
  </script>
</body>
</html>
