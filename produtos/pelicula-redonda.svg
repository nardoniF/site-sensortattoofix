  <ellipse cx="160" cy="128" rx="36" ry="18" fill="#fff" opacity="0.12"/>
  <text x="160" y="252" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">REDONDA</text>
