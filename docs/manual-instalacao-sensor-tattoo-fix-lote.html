<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Instalação — Impressão em lote (10/folha)</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 3mm;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --header-bg: #111111;
            --accent: #ffc107;
            --kit-bg: #fff3cd;
            --kit-border: #ffc107;
            --kit-title: #e65100;
            --steps-bg: #dbeafe;
            --steps-border: #42a5f5;
            --steps-title: #1565c0;
            --steps-num: #1565c0;
            --steps-strong: #0d47a1;
            --important-bg: #fff9c4;
            --important-border: #ffc107;
            --duvidas-bg: #eeeeee;
        }

        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #ddd;
        }

        .no-print {
            text-align: center;
            padding: 14px;
            font-size: 13px;
            background: #fff;
            border-bottom: 1px solid #ccc;
        }

        .no-print p { margin-bottom: 8px; color: #444; }

        .no-print button,
        .no-print a.btn {
            display: inline-block;
            font: inherit;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #ffc107;
            color: #111;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin: 0 4px;
        }

        .no-print a.btn.secondary {
            background: #fff;
            border: 1px solid #ccc;
        }

        @media print {
            body { background: #fff; }
            .no-print { display: none !important; }
            .sheet-lote { box-shadow: none; margin: 0; }
            .tile { break-inside: avoid; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        .sheet-lote {
            width: 210mm;
            height: 297mm;
            margin: 10px auto;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0,0,0,.15);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(5, 1fr);
            gap: 0;
        }

        .tile {
            border: 0.35pt dashed #bbb;
            padding: 1.8mm;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1mm;
            background: #fff;
        }

        /* ── Cabeçalho ── */
        .tile-head {
            display: flex;
            align-items: center;
            gap: 1.8mm;
            background: var(--header-bg);
            border-radius: 3px;
            padding: 1.2mm 1.8mm;
            flex-shrink: 0;
        }

        .tile-head img {
            width: 6.5mm;
            height: 6.5mm;
            border-radius: 50%;
            object-fit: cover;
            border: 0.5pt solid #ffc107;
            flex-shrink: 0;
        }

        .tile-head h1 {
            font-size: 6.8pt;
            line-height: 1.05;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .tile-head h1 span { color: var(--accent); }

        .tile-head p {
            font-size: 4.6pt;
            color: #ccc;
            margin-top: 0.3mm;
        }

        /* ── Corpo 2 colunas ── */
        .tile-body {
            display: grid;
            grid-template-columns: 0.88fr 1.12fr;
            gap: 1.2mm;
            flex: 1;
            min-height: 0;
        }

        .panel {
            border-radius: 3px;
            padding: 1.2mm 1.4mm;
            overflow: hidden;
        }

        .panel-kit {
            background: var(--kit-bg);
            border: 0.5pt solid var(--kit-border);
        }

        .panel-steps {
            background: var(--steps-bg);
            border: 0.5pt solid var(--steps-border);
        }

        h2 {
            font-size: 5.2pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.8mm;
            padding-bottom: 0.5mm;
            border-bottom: 0.8pt solid currentColor;
        }

        .panel-kit h2 { color: var(--kit-title); border-color: var(--accent); }
        .panel-steps h2 { color: var(--steps-title); border-color: var(--steps-border); }

        .kit {
            list-style: none;
            font-size: 5pt;
            line-height: 1.22;
        }

        .kit li {
            margin-bottom: 0.45mm;
            padding-left: 3mm;
            position: relative;
        }

        .kit li::before {
            content: attr(data-n) ".";
            position: absolute;
            left: 0;
            font-weight: 900;
            color: var(--kit-title);
            font-size: 4.8pt;
        }

        .steps {
            list-style: none;
            counter-reset: s;
            font-size: 5pt;
            line-height: 1.22;
        }

        .steps li {
            counter-increment: s;
            position: relative;
            padding-left: 3.8mm;
            margin-bottom: 0.45mm;
        }

        .steps li::before {
            content: counter(s);
            position: absolute;
            left: 0;
            top: 0.1mm;
            width: 2.9mm;
            height: 2.9mm;
            border-radius: 50%;
            background: var(--steps-num);
            color: #fff;
            font-size: 4.6pt;
            font-weight: 900;
            text-align: center;
            line-height: 2.9mm;
        }

        .steps li strong { font-weight: 800; color: var(--steps-strong); }

        /* ── Rodapé full-width (fora das colunas) ── */
        .tile-foot {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6mm;
        }

        .importante {
            background: var(--important-bg);
            border: 0.8pt solid var(--important-border);
            border-radius: 3px;
            padding: 0.8mm 1.2mm;
            font-size: 4.8pt;
            line-height: 1.2;
        }

        .importante-title {
            font-size: 5pt;
            font-weight: 900;
            color: var(--kit-title);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.4mm;
        }

        .importante-list {
            list-style: none;
            display: flex;
            gap: 2mm;
            flex-wrap: wrap;
        }

        .importante-list li {
            position: relative;
            padding-left: 2mm;
        }

        .importante-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #2e7d32;
            font-weight: 900;
            font-size: 4.6pt;
        }

        .duvidas {
            background: var(--duvidas-bg);
            border-radius: 3px;
            padding: 0.6mm 1.2mm;
            font-size: 4.6pt;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2mm;
        }

        .duvidas strong {
            color: #111;
            font-size: 4.8pt;
        }

        .duvidas a {
            color: #1565c0;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="no-print">
        <p><strong>Impressão em lote</strong> — 10 manuais por folha A4 · recorte nas linhas tracejadas</p>
        <p style="font-size:12px;color:#555;max-width:520px;margin:0 auto 10px;">Na janela de impressão: <strong>Escala 100%</strong> · marque <strong>Gráficos de fundo</strong> (Chrome/Safari) ou equivalente · preferir <strong>Qualidade / Colorido</strong>. Cores iguais à versão 1/folha.</p>
        <button type="button" onclick="window.print()">Imprimir / Salvar PDF</button>
        <a class="btn secondary" href="manual-instalacao-sensor-tattoo-fix.html">Versão completa (1 por folha)</a>
    </div>

    <div class="sheet-lote" id="sheet-lote" aria-label="Folha com 10 manuais"></div>

    <template id="tile-template">
        <article class="tile">
            <header class="tile-head">
                <img src="../site/logo.jpg" alt="">
                <div>
                    <h1>SENSOR <span>TATTOO FIX</span></h1>
                    <p>Manual de instalação · Tecnologia 3N20</p>
                </div>
            </header>

            <div class="tile-body">
                <section class="panel panel-kit">
                    <h2>Kit</h2>
                    <ul class="kit">
                        <li data-n="1">Lenço com álcool isopropílico</li>
                        <li data-n="2">Lente</li>
                        <li data-n="3">Vidro de potencializador</li>
                        <li data-n="4">Bastão aplicador</li>
                        <li data-n="5">Manual</li>
                    </ul>
                </section>
                <section class="panel panel-steps">
                    <h2>Passo a passo</h2>
                    <ol class="steps">
                        <li><strong>Limpe</strong> o sensor com o lenço de álcool e aguarde secar <strong>10&nbsp;s</strong> até evaporar.</li>
                        <li><strong>Retire o liner.</strong> Use a aba; não toque no adesivo.</li>
                        <li>Passe um pouco do <strong>potencializador</strong> no sensor com o bastão, camada fina.</li>
                        <li><strong>Cole</strong> bem no centro do sensor.</li>
                        <li><strong>Pressão firme e uniforme</strong> por cerca de <strong>30&nbsp;s</strong>.</li>
                        <li><strong>Cura:</strong> <strong>48&nbsp;h</strong> para atividades físicas · <strong>72&nbsp;h</strong> para molhar.</li>
                    </ol>
                </section>
            </div>

            <footer class="tile-foot">
                <div class="importante">
                    <p class="importante-title">Importante</p>
                    <ul class="importante-list">
                        <li>Ative a detecção de pulso</li>
                        <li>Sempre use o carregador original</li>
                    </ul>
                </div>
                <div class="duvidas">
                    <strong>Dúvidas:</strong>
                    <span><a href="https://www.sensortattoofix.com.br">www.sensortattoofix.com.br</a></span>
                    <span><a href="mailto:contato@sensortattoofix.com.br">contato@sensortattoofix.com.br</a></span>
                </div>
            </footer>
        </article>
    </template>

    <script>
        (function () {
            var tpl = document.getElementById('tile-template');
            var sheet = document.getElementById('sheet-lote');
            for (var i = 0; i < 10; i++) {
                sheet.appendChild(tpl.content.cloneNode(true));
            }
        })();
    </script>

</body>
</html>
