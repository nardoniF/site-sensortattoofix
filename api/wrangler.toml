name = "sensortattoofix-payments"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[kv_namespaces]]
binding = "STORE_KV"
id = "4184c034aab941e58ce5cc1e3abaecdc"

[[routes]]
pattern = "api.sensortattoofix.com.br/*"
zone_name = "sensortattoofix.com.br"

[vars]
ADMIN_USERNAME = "admin"

[triggers]
crons = ["0,30 * * * *"]

# Secrets (wrangler secret put NOME):
# ADMIN_PASSWORD       — senha do painel /admin.html
# MP_ACCESS_TOKEN      — PIX via Mercado Pago (developers.mercadopago.com)
# MP_WEBHOOK_URL       — opcional: https://SEU-WORKER.workers.dev/webhook/mercadopago
# ASAAS_API_KEY        — cartão de crédito (asaas.com)
# ASAAS_WEBHOOK_TOKEN  — token do webhook Asaas (cartão)
# PAYPAL_CLIENT_ID     — PayPal Developer → REST API (envio internacional)
# PAYPAL_CLIENT_SECRET — secret do app PayPal
# PAYPAL_SANDBOX       — opcional: "true" para sandbox
# STORE_URL            — opcional: https://www.sensortattoofix.com.br (retorno PayPal)
# CORREIOS_USER        — usuário API Correios (Meu Correios)
# CORREIOS_PASSWORD    — código de acesso API Correios
# CORREIOS_CONTRACT             — cartão de postagem (10 dígitos)
# CORREIOS_COMMERCIAL_CONTRACT  — contrato comercial (ex.: 9912752041)
# RESEND_API_KEY       — e-mails com remetente profissional (resend.com, grátis até 3k/mês)
# EMAIL_FROM           — opcional: Sensor Tattoo Fix <pedidos@sensortattoofix.com.br>
# GA4_API_SECRET       — secret do Measurement Protocol (GA4 → Fluxos de dados → seu site)
# GOOGLE_PLACES_API_KEY  — opcional: autocomplete de endereço internacional (senão usa Photon/OSM grátis)
