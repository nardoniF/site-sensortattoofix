name = "sensortattoofix-payments"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "STORE_KV"
id = "4184c034aab941e58ce5cc1e3abaecdc"

[vars]
ADMIN_USERNAME = "admin"

# Secrets (wrangler secret put NOME):
# ADMIN_PASSWORD       — senha do painel /admin.html
# ASAAS_API_KEY        — confirmação PIX automática (asaas.com)
# ASAAS_WEBHOOK_TOKEN  — token do webhook Asaas
# CORREIOS_USER        — usuário API Correios (Meu Correios)
# CORREIOS_PASSWORD    — código de acesso API Correios
# CORREIOS_CONTRACT    — número do contrato/cartão postagem (opcional)
# RESEND_API_KEY       — e-mails com remetente profissional (resend.com, grátis até 3k/mês)
# EMAIL_FROM           — opcional: Sensor Tattoo Fix <pedidos@sensortattoofix.com.br>
